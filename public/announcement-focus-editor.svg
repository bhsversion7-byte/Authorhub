<svg viewBox="0 0 640 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="专注编辑器示意图">
  <rect width="640" height="320" rx="20" fill="#faf6ec" />

  <!-- compact outline card, left -->
  <g transform="translate(28,54)">
    <rect width="190" height="200" rx="16" fill="#ffffff" stroke="#e3d7c2" stroke-width="1.5" />
    <text x="18" y="34" font-family="Georgia, serif" font-size="16" fill="#3c332a" font-weight="700">大纲</text>
    <rect x="144" y="16" width="30" height="30" rx="10" fill="#f3e9d4" />
    <path d="M153 36 L165 24 M156 24 H165 V33" stroke="#8a6a3d" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M176 46 L167 38" stroke="#c8925a" stroke-width="1.8" fill="none" stroke-linecap="round" />
    <path d="M168 38 L169 43 L173 41" fill="#c8925a" />
    <rect x="18" y="54" width="154" height="8" rx="4" fill="#e7ddc9" />
    <rect x="18" y="72" width="140" height="8" rx="4" fill="#e7ddc9" />
    <rect x="18" y="90" width="150" height="8" rx="4" fill="#e7ddc9" />
    <rect x="18" y="108" width="120" height="8" rx="4" fill="#e7ddc9" />
    <rect x="18" y="126" width="145" height="8" rx="4" fill="#e7ddc9" />
    <text x="18" y="174" font-size="10" fill="#8a7355">点击右上角放大按钮</text>
  </g>

  <!-- arrow -->
  <path d="M240 160 H298" stroke="#c9a06b" stroke-width="2.5" fill="none" stroke-linecap="round" />
  <path d="M290 150 L302 160 L290 170" stroke="#c9a06b" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" />

  <!-- expanded focus editor, right -->
  <g transform="translate(322,30)">
    <rect width="290" height="260" rx="18" fill="#fdfbf6" stroke="#e3d7c2" stroke-width="1.5" />
    <text x="20" y="34" font-family="Georgia, serif" font-size="17" fill="#3c332a" font-weight="700">大纲 · 专注编辑</text>
    <rect x="198" y="16" width="72" height="24" rx="10" fill="#f3e9d4" />
    <text x="234" y="32" font-size="10" fill="#6d5432" text-anchor="middle" font-weight="700">Aa 文本样式</text>

    <!-- page tabs -->
    <rect x="20" y="48" width="46" height="22" rx="8" fill="#c8925a" />
    <text x="43" y="63" font-size="10" fill="#fff8ef" text-anchor="middle" font-weight="700">全文</text>
    <rect x="72" y="48" width="58" height="22" rx="8" fill="#dcae76" />
    <text x="101" y="63" font-size="10" fill="#4a301a" text-anchor="middle" font-weight="700">情况一</text>
    <rect x="136" y="48" width="58" height="22" rx="8" fill="#dcae76" />
    <text x="165" y="63" font-size="10" fill="#4a301a" text-anchor="middle" font-weight="700">情况二</text>

    <!-- text lines -->
    <rect x="20" y="86" width="250" height="7" rx="3.5" fill="#eee2c9" />
    <rect x="20" y="102" width="230" height="7" rx="3.5" fill="#eee2c9" />
    <rect x="20" y="118" width="240" height="7" rx="3.5" fill="#eee2c9" />
    <rect x="20" y="134" width="200" height="7" rx="3.5" fill="#eee2c9" />
    <rect x="20" y="150" width="235" height="7" rx="3.5" fill="#eee2c9" />
    <rect x="20" y="166" width="180" height="7" rx="3.5" fill="#eee2c9" />

    <!-- search + stats row -->
    <rect x="20" y="202" width="140" height="20" rx="10" fill="#ffffff" stroke="#e3d7c2" />
    <circle cx="34" cy="212" r="4.5" fill="none" stroke="#a98a5c" stroke-width="1.4" />
    <line x1="37.5" y1="215.5" x2="41" y2="219" stroke="#a98a5c" stroke-width="1.4" stroke-linecap="round" />
    <text x="48" y="216" font-size="9" fill="#8a7355">搜索当前内容</text>
    <text x="250" y="216" font-size="9" fill="#8a7355" text-anchor="end">238 字 · 第 8 行</text>
    <rect x="20" y="232" width="78" height="16" rx="8" fill="#c8925a" />
    <text x="59" y="244" font-size="9" fill="#fff8ef" text-anchor="middle" font-weight="700">保存并退出</text>
  </g>
</svg>
