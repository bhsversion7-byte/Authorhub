<svg viewBox="0 0 640 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="星图区域锁定功能示意图">
  <rect width="640" height="320" rx="20" fill="#f4f2ea" />

  <!-- left panel: shift+drag to select -->
  <g transform="translate(28,40)">
    <rect width="270" height="240" rx="16" fill="#ffffff" stroke="#dcd6c6" stroke-width="1.5" />
    <text x="18" y="30" font-family="Georgia, serif" font-size="14" fill="#3c332a" font-weight="700">1. 按住 Shift/Cmd 拖框选中</text>
    <!-- star nodes -->
    <circle cx="90" cy="120" r="20" fill="#8fa893" />
    <circle cx="150" cy="150" r="16" fill="#96aab8" />
    <circle cx="205" cy="90" r="14" fill="#c08b6e" />
    <!-- dashed selection box around the two left nodes -->
    <rect x="58" y="88" width="128" height="94" rx="0" fill="rgba(141,122,107,0.08)" stroke="#8d7a6b" stroke-width="1.6" stroke-dasharray="6 5" />
    <text x="18" y="216" font-size="11" fill="#8a7355">拖出的方框会圈住经过的星球</text>
  </g>

  <!-- arrow -->
  <path d="M312 160 H346" stroke="#c9a06b" stroke-width="2.5" fill="none" stroke-linecap="round" />
  <path d="M338 150 L350 160 L338 170" stroke="#c9a06b" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" />

  <!-- right panel: right-click to lock -->
  <g transform="translate(366,40)">
    <rect width="246" height="240" rx="16" fill="#fdfbf6" stroke="#dcd6c6" stroke-width="1.5" />
    <text x="18" y="30" font-family="Georgia, serif" font-size="14" fill="#3c332a" font-weight="700">2. 右键选择「锁定位置」</text>
    <!-- locked stars with square dashed ring -->
    <rect x="46" y="76" width="68" height="68" rx="0" fill="none" stroke="#8d7a6b" stroke-width="1.4" stroke-dasharray="4 4" />
    <circle cx="80" cy="110" r="20" fill="#8fa893" />
    <rect x="120" y="118" width="60" height="60" rx="0" fill="none" stroke="#8d7a6b" stroke-width="1.4" stroke-dasharray="4 4" />
    <circle cx="150" cy="148" r="16" fill="#96aab8" />
    <!-- context menu -->
    <g transform="translate(150,60)">
      <rect width="86" height="60" rx="10" fill="#ffffff" stroke="#dcd6c6" />
      <rect x="8" y="8" width="70" height="18" rx="6" fill="rgba(141,122,107,0.14)" />
      <text x="43" y="21" font-size="10" fill="#3c332a" text-anchor="middle" font-weight="700">锁定位置</text>
      <text x="43" y="44" font-size="10" fill="#8a7355" text-anchor="middle">取消锁定</text>
    </g>
    <text x="18" y="216" font-size="11" fill="#8a7355">锁定后新增人物不会再打乱它们</text>
  </g>
</svg>
