name: Quality and production

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: authorhub-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm run build
      - run: npm audit --audit-level=high
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: playwright-report
          path: output/
          retention-days: 7

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: github/codeql-action/init@ddf5ce7296213f5548c91e2dd19df2d77d2b2d66 # v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@ddf5ce7296213f5548c91e2dd19df2d77d2b2d66 # v3

  migration-changes:
    runs-on: ubuntu-latest
    outputs:
      supabase: ${{ steps.filter.outputs.supabase }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        id: filter
        with:
          filters: |
            supabase:
              - 'supabase/migrations/**'
              - 'supabase/config.toml'

  supabase:
    needs: migration-changes
    if: needs.migration-changes.outputs.supabase == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v3
        with:
          version: 2.109.1
      - run: supabase start
      - run: supabase db reset
      - run: supabase db lint --local --level warning

  quality_gate:
    if: always()
    needs: [quality, secrets, codeql, supabase]
    runs-on: ubuntu-latest
    steps:
      - name: Require every applicable check
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          SECRETS_RESULT: ${{ needs.secrets.result }}
          CODEQL_RESULT: ${{ needs.codeql.result }}
          SUPABASE_RESULT: ${{ needs.supabase.result }}
        run: |
          test "$QUALITY_RESULT" = "success"
          test "$SECRETS_RESULT" = "success"
          test "$CODEQL_RESULT" = "success"
          test "$SUPABASE_RESULT" = "success" || test "$SUPABASE_RESULT" = "skipped"

  deploy-production:
    if: >-
      always() && github.event_name == 'push' && github.ref == 'refs/heads/master' &&
      needs.quality_gate.result == 'success'
    needs: [quality_gate]
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Remember current production
        run: |
          CURRENT=$(curl --fail --silent --show-error -H "Authorization: Bearer $VERCEL_TOKEN" "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_ORG_ID&target=production&limit=1" | jq -r '.deployments[0].url // empty')
          echo "PREVIOUS_PRODUCTION=$CURRENT" >> "$GITHUB_ENV"
      - run: npx vercel@48.8.0 pull --yes --environment=production --token="$VERCEL_TOKEN"
      - run: npx vercel@48.8.0 build --prod --token="$VERCEL_TOKEN"
      - name: Deploy prebuilt production artifact
        id: deploy
        run: |
          URL=$(npx vercel@48.8.0 deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
      - name: Production smoke test and rollback
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
        run: |
          if ! curl --fail --silent --show-error --retry 5 --retry-delay 4 "$DEPLOYMENT_URL" >/dev/null; then
            if [ -n "$PREVIOUS_PRODUCTION" ]; then
              npx vercel@48.8.0 rollback "https://$PREVIOUS_PRODUCTION" --yes --token="$VERCEL_TOKEN"
            fi
            exit 1
          fi
